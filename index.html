<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="icon" href="data:,">
<title>STRATCOM v15.7 - FULL RECON</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  html, body { margin:0; height:100%; background:#000; font-family: 'Share Tech Mono', monospace; color: #00ffcc; overflow: hidden; }
  #map { width:100%; height:100%; background: #000; }
  
  #hud { 
    position: absolute; top: 10px; left: 10px; right: 10px; max-width: 440px;
    background: rgba(5, 10, 15, 0.95); border: 1px solid #00ffcc; 
    padding: 12px; z-index: 1000; pointer-events: none;
  }
  #intel-log { height: 75px; overflow-y: auto; font-size: 11px; border-top: 1px solid #1a3a3a; margin-top: 8px; padding-top: 5px; color: #00ccaa; pointer-events: auto; }
  
  .filter-row { display: flex; gap: 5px; margin-top: 10px; pointer-events: auto; }
  .tgl-btn { flex: 1; background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; color: #00ffcc; font-family: 'Share Tech Mono'; font-size: 10px; padding: 6px; cursor: pointer; text-align: center; }
  .tgl-btn.active { background: #00ffcc; color: #000; font-weight: bold; box-shadow: 0 0 10px #00ffcc; }
  .btn-refresh { pointer-events: auto; background: #00ffcc; color: #000; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; float: right; font-size: 10px; }

  /* VSI Styling */
  .vsi-arrow { font-size: 14px; font-weight: bold; margin-left: 18px; text-shadow: 0 0 3px black; }
  .climb { color: #00ff00; }
  .dive { color: #ff3300; }

  /* RESTORED: v15.2 Popup Styling */
  .leaflet-popup-content-wrapper { background: #ffffff !important; color: #000 !important; border-radius: 0px; border: 2px solid #333; }
  .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
  .popup-intel { font-family: 'Arial', sans-serif; font-size: 12px; padding: 12px; }
  .mil-banner { background: #d32f2f; color: #fff; padding: 6px; font-weight: bold; text-align: center; font-size: 10px; margin-bottom: 8px; }
  .squawk-alert { background: #ff0000; color: #fff; padding: 6px; font-weight: bold; text-align: center; margin-bottom: 8px; animation: flashWarning 1s infinite; }
  
  .intel-row { border-bottom: 1px solid #eee; padding: 4px 0; display: flex; justify-content: space-between; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
  .intel-row b { color: #555; font-size: 10px; }
  .intel-row span { color: #000; font-weight: bold; }
  
  @keyframes flashWarning { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .ac-icon { display: flex; justify-content: center; align-items: center; }
</style>
</head>
<body>

<div id="hud">
  <button class="btn-refresh" onclick="scrapeRadar()">SCAN PULSE</button>
  <div style="font-size: 20px; font-weight: bold; letter-spacing: 2px;">🛰️ STRATCOM v15.7</div>
  <div id="status" style="font-size: 11px; color: #ffcc00;">INTEL: FULL RECON MODE</div>
  
  <div class="filter-row">
    <div id="f-mil" class="tgl-btn" onclick="toggleFilter('mil')">MIL ASSETS</div>
    <div id="f-heli" class="tgl-btn" onclick="toggleFilter('heli')">ROTORCRAFT</div>
    <div id="f-infra" class="tgl-btn active" onclick="toggleFilter('infra')">INFRA</div>
  </div>
  <div id="intel-log">> Popup Data Arrays Restored...<br>> Global Infrastructure Mapped...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const WORKER_URL = "https://adsb-bridge.lezattackpenguinskindig.workers.dev/";
const ICAO_MILITARY = [0xAE0000, 0xAF0000, 0xAD0000, 0x43C000];

let map, flightLayers, infraLayers, trailLayers;
let isUpdating = false;
const filters = { mil: false, heli: false, infra: true };

function toggleFilter(type) {
    filters[type] = !filters[type];
    document.getElementById(`f-${type}`).classList.toggle('active');
    if(type === 'infra') filters[type] ? infraLayers.addTo(map) : map.removeLayer(infraLayers);
    scrapeRadar();
}

function initMap() {
    const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
    const satHD = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
    const weatherEU = L.tileLayer('https://tilecache.rainviewer.com/v2/radar/nowcast_10/512/{z}/{x}/{y}/2/1_1.png', { opacity: 0.45 });

    map = L.map('map', { zoomControl: false, layers: [darkMap] }).setView([38.8, -77.0], 5);
    L.control.layers({"Ops Center": darkMap, "Satellite": satHD}, {"Global Radar": weatherEU}).addTo(map);

    flightLayers = L.layerGroup().addTo(map);
    infraLayers = L.layerGroup().addTo(map);
    trailLayers = L.layerGroup().addTo(map);
    
    loadInfrastructure();
    map.on('moveend', scrapeRadar);
    scrapeRadar();
    setInterval(scrapeRadar, 15000);
}

const getIcon = (color, track, isHeli, isDistress, baroRate) => {
    const rot = track || 0;
    const planePath = "M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z";
    const heliPath = "M12 2L13 3H21V5H13L12 6H15V8H13V12H15V14H13V19H11V14H9V12H11V8H9V6H12L11 3H3V1H11L12 2Z";

    let vsiSymbol = "";
    if (baroRate > 700) vsiSymbol = '<span class="vsi-arrow climb">▲</span>';
    else if (baroRate < -700) vsiSymbol = '<span class="vsi-arrow dive">▼</span>';

    const svg = `<div style="position:relative;">
        <svg viewBox="0 0 24 24" width="26" height="26" style="transform: rotate(${rot}deg); filter: drop-shadow(0 0 2px black);"><path fill="${color}" d="${isHeli ? heliPath : planePath}"/></svg>
        <div style="position:absolute; top:-8px; left:12px;">${vsiSymbol}</div>
    </div>`;
    
    return L.divIcon({ html: svg, className: `ac-icon`, iconSize: [26, 26] });
};

function loadInfrastructure() {
    const bases = [
        { n: "Ramstein Air Base (DE)", c: [49.44, 7.60] },
        { n: "Andrews AFB (US)", c: [38.81, -76.86] },
        { n: "Sigonella NAS (IT)", c: [37.40, 14.92] },
        { n: "Heathrow (UK)", c: [51.47, -0.45] },
        { n: "Ezeiza (AR)", c: [-34.82, -58.53] }
    ];
    bases.forEach(b => {
        L.circleMarker(b.c, { radius: 5, color: '#ffcc00', weight: 1, fillOpacity: 0.5 }).bindPopup(`<b>INFO:</b> ${b.n}`).addTo(infraLayers);
    });
}

async function scrapeRadar() {
    if(!map || isUpdating) return;
    isUpdating = true;
    const center = map.getCenter();
    const bridgeUrl = `${WORKER_URL}?url=${encodeURIComponent(`https://api.adsb.lol/v2/lat/${center.lat.toFixed(3)}/lon/${center.lng.toFixed(3)}/dist/250`)}&p=${Date.now()}`;

    try {
        const res = await fetch(bridgeUrl);
        const data = await res.json();
        const aircraft = data.ac || [];
        flightLayers.clearLayers();

        aircraft.forEach(ac => {
            if (!ac.lat || !ac.lon) return;
            const isMil = ac.mil === 1 || ICAO_MILITARY.some(m => (parseInt(ac.hex, 16) & 0xFF0000) === m);
            const isHeli = (ac.t && (ac.t.includes('H6') || ac.t.includes('EC'))) || ac.category === 'A7';
            const sq = ac.squawk || '';
            const isDistress = ['7700','7600','7500'].includes(sq);

            if (!isDistress) {
                if (filters.mil && !isMil) return;
                if (filters.heli && !isHeli) return;
            }

            let color = isMil ? '#ff0000' : (isHeli ? '#ffcc00' : '#00ffcc');
            if (isDistress) color = '#ff0000';

            L.marker([ac.lat, ac.lon], { icon: getIcon(color, ac.track, isHeli, isDistress, ac.baro_rate) })
            .bindPopup(`
                <div class="popup-intel">
                    ${isDistress ? `<div class="squawk-alert">🚨 ALERT: SQUAWK ${sq}</div>` : ''}
                    ${isMil && !isDistress ? '<div class="mil-banner">MILITARY ASSET</div>' : ''}
                    
                    <div class="intel-row"><b>CALLSIGN:</b> <span>${ac.flight || 'N/A'}</span></div>
                    <div class="intel-row"><b>HEX ID:</b> <span>${ac.hex.toUpperCase()}</span></div>
                    <div class="intel-row"><b>REG:</b> <span>${ac.r || ac.reg || 'N/A'}</span></div>
                    <div class="intel-row"><b>TYPE/DESC:</b> <span>${ac.t || ''} ${ac.desc || ''}</span></div>
                    <div class="intel-row"><b>SQUAWK:</b> <span>${sq || '----'}</span></div>
                    <div class="intel-row"><b>VSI:</b> <span style="color:${ac.baro_rate >= 0 ? 'green':'red'}">${ac.baro_rate || 0} FPM</span></div>
                    <div class="intel-row"><b>NIC:</b> <span>${ac.nic || 0}</span></div>
                    
                    <div style="margin-top:10px; font-weight:bold; border-top: 1px solid #333; padding-top:6px; color:#d32f2f;">
                        ALT: ${ac.alt_baro || '---'} FT | SPD: ${Math.round(ac.gs || 0)} KTS
                    </div>
                </div>
            `).addTo(flightLayers);
        });
        document.getElementById('status').innerHTML = `ACTIVE: ${aircraft.length} TARGETS`;
    } catch (e) { document.getElementById('status').innerHTML = "LINK TIMEOUT"; }
    finally { isUpdating = false; }
}

window.onload = () => { setTimeout(initMap, 500); };
</script>
</body>
</html>
