<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="icon" href="data:,"> <title>STRATCOM v15.3 - FULL BUILD</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  
  html, body { margin:0; height:100%; background:#000; font-family: 'Share Tech Mono', monospace; color: #00ffcc; overflow: hidden; }
  #map { width:100%; height:100%; background: #000; }
  
  /* HUD & Interface */
  #hud { 
    position: absolute; top: 10px; left: 10px; right: 10px; max-width: 420px;
    background: rgba(5, 10, 15, 0.95); border: 1px solid #00ffcc; 
    padding: 12px; z-index: 1000; pointer-events: none;
    box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
  }
  #intel-log { height: 80px; overflow-y: auto; font-size: 11px; border-top: 1px solid #1a3a3a; margin-top: 8px; padding-top: 5px; color: #00ccaa; pointer-events: auto; }
  
  /* Filter UI */
  .filter-row { display: flex; gap: 5px; margin-top: 10px; pointer-events: auto; }
  .tgl-btn { 
    flex: 1; background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; color: #00ffcc;
    font-family: 'Share Tech Mono'; font-size: 10px; padding: 6px; cursor: pointer; text-align: center;
    transition: 0.2s;
  }
  .tgl-btn.active { background: #00ffcc; color: #000; font-weight: bold; box-shadow: 0 0 10px #00ffcc; }
  .btn-refresh { pointer-events: auto; background: #00ffcc; color: #000; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; float: right; font-size: 10px; }

  /* Tactical Popups */
  .leaflet-popup-content-wrapper { background: #ffffff !important; color: #000 !important; border-radius: 0px; border: 2px solid #333; }
  .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
  .popup-intel { font-family: 'Arial', sans-serif; font-size: 12px; padding: 12px; }
  .mil-banner { background: #d32f2f; color: #fff; padding: 6px; font-weight: bold; text-align: center; font-size: 10px; margin-bottom: 8px; }
  .nic-warn { background: #bf00ff; color: #fff; padding: 4px; font-size: 10px; text-align: center; margin-bottom: 5px; font-weight: bold; }
  .squawk-alert { background: #ff0000; color: #fff; padding: 6px; font-weight: bold; text-align: center; margin-bottom: 8px; animation: flashWarning 1s infinite; }
  
  .intel-row { border-bottom: 1px solid #eee; padding: 4px 0; display: flex; justify-content: space-between; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
  .intel-row b { color: #555; font-size: 10px; }
  .intel-row span { color: #000; font-weight: bold; }
  
  /* Animations */
  @keyframes flashWarning { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  @keyframes beaconPulse { 0% { transform: scale(1); } 50% { filter: drop-shadow(0 0 10px red); transform: scale(1.2); } 100% { transform: scale(1); } }
  .icon-distress svg { animation: beaconPulse 0.8s infinite; }

  .ac-icon { display: flex; justify-content: center; align-items: center; }
  .leaflet-control-layers { background: rgba(5, 10, 15, 0.9) !important; color: #00ffcc !important; border: 1px solid #00ffcc !important; font-family: 'Share Tech Mono' !important; }
</style>
</head>
<body>

<div id="hud">
  <button class="btn-refresh" onclick="scrapeRadar()">SCAN PULSE</button>
  <div style="font-size: 20px; font-weight: bold; letter-spacing: 2px;">🛰️ STRATCOM v15.3</div>
  <div id="status" style="font-size: 11px; color: #ffcc00;">UPLINK: STABLE</div>
  
  <div class="filter-row">
    <div id="f-mil" class="tgl-btn" onclick="toggleFilter('mil')">MIL ONLY</div>
    <div id="f-heli" class="tgl-btn" onclick="toggleFilter('heli')">HELI ONLY</div>
    <div id="f-nic" class="tgl-btn" onclick="toggleFilter('nic')">LOW NIC</div>
  </div>

  <div id="intel-log">> OSINT Uplink Established...<br>> Squawk Monitor Armed...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const WORKER_URL = "https://adsb-bridge.lezattackpenguinskindig.workers.dev/";
const ICAO_MILITARY = [0xAE0000, 0xAF0000, 0xAD0000, 0x43C000];

let map, flightLayers, noFlyLayers, trailLayers;
let isUpdating = false;
let history = {}; 
let lastPanTime = 0;
const filters = { mil: false, heli: false, nic: false };

function toggleFilter(type) {
    filters[type] = !filters[type];
    document.getElementById(`f-${type}`).classList.toggle('active');
    hudLog(`Filter: ${type.toUpperCase()} ${filters[type] ? 'ACTIVE' : 'OFF'}`);
    scrapeRadar();
}

function initMap() {
    // 1. Base Map Layers
    const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
    const satHD = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19, attribution: 'Tiles &copy; Esri'
    });
    const weatherMap = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi", {
        layers: 'nexrad-n0r-900913', format: 'image/png', transparent: true, opacity: 0.5
    });

    // 2. Initialize Map
    map = L.map('map', { zoomControl: false, preferCanvas: true, layers: [darkMap] }).setView([38.89, -77.03], 7);
    
    // Layer Control (Top Right)
    L.control.layers({"Dark Ops": darkMap, "HD Satellite": satHD}, {"NEXRAD Weather": weatherMap}).addTo(map);

    // 3. Feature Groups
    flightLayers = L.layerGroup().addTo(map);
    noFlyLayers = L.layerGroup().addTo(map);
    trailLayers = L.layerGroup().addTo(map);
    
    // 4. Attach Event Listeners (Inside initMap to avoid 'undefined' error)
    map.on('moveend', scrapeRadar);
    
    // 5. Initial Scans
    runBotSwarm();
    scrapeRadar();
    
    // 6. Intervals
    setInterval(scrapeRadar, 15000); // 15s Radar Scan
    setInterval(runBotSwarm, 120000); // 2min TFR Scan
    
    hudLog("SYSTEM INITIALIZED: OK");
}

const hudLog = (msg) => {
    const log = document.getElementById('intel-log');
    if(log) log.innerHTML = `> ${msg}<br>` + log.innerHTML.slice(0, 300);
};

// TFR / No-Fly Zone Logic
async function runBotSwarm() {
    const faaTfrUrl = "https://services6.arcgis.com/ssUqYtj9l9mC24RE/arcgis/rest/services/Temporary_Flight_Restrictions/FeatureServer/0/query?where=1%3D1&f=geojson";
    const bridgeUrl = `${WORKER_URL}?url=${encodeURIComponent(faaTfrUrl)}`;
    
    try {
        const res = await fetch(bridgeUrl);
        const geojson = await res.json();
        if(geojson.features) {
            noFlyLayers.clearLayers();
            L.geoJSON(geojson, { 
                style: { color: '#ff3300', weight: 2, fillOpacity: 0.1, dashArray: '8, 4' } 
            }).addTo(noFlyLayers);
            hudLog(`TFR: Sync Complete (${geojson.features.length} zones)`);
        }
    } catch (e) { hudLog("TFR: Link Timeout"); }
}

// Icon Factory
const getIcon = (color, track, isHeli, isDistress) => {
    const rot = track || 0;
    const heliPath = "M12 2l1 1h8v2h-8l-1 1h3v2h-2v4h2v2h-2v5h-2v-5h-2v-2h2v-4h-2v-2h3l-1-1h-8v-2h8l1-1z";
    const planePath = "M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z";
    const dClass = isDistress ? 'icon-distress' : '';
    const svg = `<svg viewBox="0 0 24 24" width="26" height="26" style="transform: rotate(${rot}deg); filter: drop-shadow(0 0 2px black);"><path fill="${color}" d="${isHeli ? heliPath : planePath}"/></svg>`;
    return L.divIcon({ html: svg, className: `ac-icon ${dClass}`, iconSize: [26, 26] });
};

// Radar Logic
async function scrapeRadar() {
    if(!map || isUpdating) return;
    isUpdating = true;
    document.getElementById('status').innerHTML = "SCANNING PULSE...";

    const center = map.getCenter();
    const apiTarget = `https://api.adsb.lol/v2/lat/${center.lat.toFixed(3)}/lon/${center.lng.toFixed(3)}/dist/100`;
    const bridgeUrl = `${WORKER_URL}?url=${encodeURIComponent(apiTarget)}&pulse=${Date.now()}`;

    try {
        const res = await fetch(bridgeUrl, { signal: AbortSignal.timeout(10000) });
        const data = await res.json();
        const aircraft = data.ac || [];
        
        flightLayers.clearLayers();
        trailLayers.clearLayers();
        
        let visibleCount = 0;

        aircraft.forEach(ac => {
            if (!ac.lat || !ac.lon) return;

            const nic = ac.nic || 0;
            const isLowNic = nic < 7;
            const isHeli = (ac.t && (ac.t.includes('EC') || ac.t.includes('B0') || ac.t.includes('H6') || ac.t.includes('SK76') || ac.t.includes('MD5'))) || (ac.category === 'A7');
            const hexVal = parseInt(ac.hex, 16);
            const isMil = ac.mil === 1 || ICAO_MILITARY.some(m => (hexVal & 0xFF0000) === m);
            const sq = ac.squawk || '';
            const isDistress = (sq === '7700' || sq === '7600' || sq === '7500');

            // --- FILTER GATE ---
            if (!isDistress) {
                if (filters.mil && !isMil) return;
                if (filters.heli && !isHeli) return;
                if (filters.nic && !isLowNic) return;
            }

            visibleCount++;
            let color = isMil ? '#ff0000' : (isHeli ? '#ffcc00' : '#00ffcc');
            if (isLowNic) color = '#bf00ff';
            if (isDistress) color = '#ff0000';

            // Trails
            if (!history[ac.hex]) history[ac.hex] = [];
            history[ac.hex].push([ac.lat, ac.lon]);
            if (history[ac.hex].length > 5) history[ac.hex].shift();
            L.polyline(history[ac.hex], { color: color, weight: 1.5, opacity: 0.4, dashArray: '2, 4' }).addTo(trailLayers);

            L.marker([ac.lat, ac.lon], { icon: getIcon(color, ac.track, isHeli, isDistress) })
            .bindPopup(`
                <div class="popup-intel">
                    ${isDistress ? `<div class="squawk-alert">🚨 EMERGENCY SQUAWK: ${sq}</div>` : ''}
                    ${isMil && !isDistress ? '<div class="mil-banner">MILITARY ASSET</div>' : ''}
                    ${isLowNic && !isDistress ? `<div class="nic-warn">SIGNAL WARNING: NIC ${nic}</div>` : ''}
                    
                    <div class="intel-row"><b>CALLSIGN:</b> <span>${ac.flight || 'N/A'}</span></div>
                    <div class="intel-row"><b>HEX ID:</b> <span>${ac.hex ? ac.hex.toUpperCase() : 'N/A'}</span></div>
                    <div class="intel-row"><b>REG:</b> <span>${ac.r || ac.reg || 'N/A'}</span></div>
                    <div class="intel-row"><b>TYPE:</b> <span>${ac.t || 'N/A'}</span></div>
                    <div class="intel-row"><b>MODEL:</b> <span>${ac.desc || 'N/A'}</span></div>
                    <div class="intel-row"><b>SQUAWK:</b> <span>${sq || 'N/A'}</span></div>
                    <div class="intel-row"><b>NIC:</b> <span>${nic}</span></div>
                    
                    <div style="margin-top:10px; font-weight:bold; border-top: 1px solid #333; padding-top:6px; color:#d32f2f;">
                        ALT: ${ac.alt_baro || '---'} FT | SPD: ${Math.round(ac.gs || 0)} KTS
                    </div>
                </div>
            `)
            .addTo(flightLayers);

            // Auto-pan Emergency
            if (sq === '7700' && Date.now() - lastPanTime > 60000) {
                map.panTo([ac.lat, ac.lon]);
                lastPanTime = Date.now();
                hudLog("EMERGENCY PAN INITIATED.");
            }
        });
        
        document.getElementById('status').innerHTML = `LOCKED: ${visibleCount} TARGETS`;
    } catch (e) { document.getElementById('status').innerHTML = "UPLINK: TIMEOUT"; }
    finally { isUpdating = false; }
}

// Start Sequence
window.onload = () => {
    setTimeout(initMap, 500);
};
</script>
</body>
</html>
