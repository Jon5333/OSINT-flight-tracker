<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>OSINT STRATCOM v11.1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ffcc; }
  
  /* Bulletproof Mobile Map Sizing */
  #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
  
  #hud { position: absolute; top: 15px; left: 15px; width: 320px; max-width: 80vw; background: rgba(5,5,10,0.95); border: 1px solid #00ffcc; padding: 15px; z-index: 9999; box-shadow: 0 0 20px rgba(0,255,204,0.2); pointer-events: none; }
  
  #intel-log { height: 140px; overflow-y: auto; font-size: 11px; border-top: 1px solid #1a3a3a; margin-top: 10px; padding-top: 5px; color: #00ffaa; word-wrap: break-word; pointer-events: auto; }
  
  .leaflet-popup-content-wrapper { background: #fff !important; color: #000 !important; border-radius: 0; border: 2px solid #333; }
  .leaflet-popup-tip { background: #fff !important; }
  .popup-intel { font-family: Arial, sans-serif; font-size: 12px; line-height: 1.4; color: #000; }
  .mil-banner { background: #cc0000; color: #fff; padding: 4px; font-weight: bold; text-align: center; margin-bottom: 5px; }
  .leo-banner { background: #0033cc; color: #fff; padding: 4px; font-weight: bold; text-align: center; margin-bottom: 5px; }
  .mission-tag { background: #eee; border: 1px dashed #333; padding: 3px; font-weight: bold; margin-top: 4px; display: inline-block; }
  .ac-icon { display: flex; justify-content: center; align-items: center; }
  .ac-icon svg { transform-origin: center; display: block; }
</style>
</head>
<body>

<div id="map"></div>

<div id="hud">
  <div style="font-size: 20px; font-weight: bold;">🛰️ STRATCOM v11.1</div>
  <div style="font-size: 10px; color: #888;">AGENTS: ACTIVE | RADAR: LIVE</div>
  <div id="intel-log">> Booting System...<br></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// --- 1. GLOBAL ERROR CATCHER (THE DEBUGGER) ---
window.onerror = function(msg, url, line) {
    const log = document.getElementById('intel-log');
    log.innerHTML = `> <span style="color:red; font-weight:bold;">SYS ERR: ${msg} (Line ${line})</span><br>` + log.innerHTML;
    return false;
};

const hudLog = (msg) => {
    const log = document.getElementById('intel-log');
    log.innerHTML = `> ${msg}<br>` + log.innerHTML;
};

hudLog("Initializing Map Engine...");

// --- 2. CORE INTEL DICTIONARIES ---
const ICAO_RANGES = [
    { start: 0xAE0000, end: 0xAFFFFF, country: "USA 🇺🇸", type: "MILITARY" },
    { start: 0xAD0000, end: 0xADFFFF, country: "USA 🇺🇸", type: "MILITARY" },
    { start: 0xA00000, end: 0xAFFFFF, country: "USA 🇺🇸", type: "CIVILIAN" },
    { start: 0x43C000, end: 0x43CFFF, country: "UK 🇬🇧", type: "MILITARY" },
    { start: 0x400000, end: 0x43FFFF, country: "UK 🇬🇧", type: "CIVILIAN" },
    { start: 0x3F0000, end: 0x3FFFFF, country: "Germany 🇩🇪", type: "MILITARY" },
    { start: 0x140000, end: 0x15FFFF, country: "Russia 🇷🇺", type: "CIVILIAN/MIL" },
    { start: 0x780000, end: 0x7BFFFF, country: "China 🇨🇳", type: "CIVILIAN/MIL" },
    { start: 0xC00000, end: 0xC3FFFF, country: "Canada 🇨🇦", type: "CIVILIAN" }
];

const LEO_AGENCIES = {
    "CBP": ["TROY", "OMAHA", "CUSTOMS"],
    "FBI": ["NG RESEARCH", "OTV LEASING", "FVX RESEARCH", "KQM AVIATION", "OBR LEASING"],
    "POLICE": ["POLICE", "SHERIFF", "HIGHWAY PATROL", "DEPT OF PUBLIC SAFETY"]
};

// --- 3. MAP SETTINGS ---
const map = L.map('map', { zoomControl: false }).setView([38.89, -77.03], 6);
const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
const weatherMap = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi", {
    layers: 'nexrad-n0r-900913', format: 'image/png', transparent: true, opacity: 0.6
});

L.control.layers({"Dark Ops Base": darkMap}, {"Live NEXRAD Radar": weatherMap}).addTo(map);
darkMap.addTo(map);

const history = {};
const routeCache = {};
const flightLayers = L.layerGroup().addTo(map);

// --- 4. ICONS & LOGIC ---
const getIcon = (isHeli, color, track) => {
    const planeSVG = `<svg viewBox="0 0 24 24" width="22" height="22" style="transform: rotate(${track}deg);"><path fill="${color}" d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`;
    const heliSVG = `<svg viewBox="0 0 24 24" width="24" height="24" style="transform: rotate(${track}deg);"><path fill="${color}" d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14h-2v-4h2v4zm0-6h-2V6h2v4z"/><path fill="${color}" d="M11 6h2v8h-2zM4 11h16v2H4z"/></svg>`;
    return L.divIcon({ html: isHeli ? heliSVG : planeSVG, className: 'ac-icon', iconSize: [24, 24], iconAnchor: [12, 12] });
};

const analyzeHex = (hex) => {
    const val = parseInt(hex, 16);
    const match = ICAO_RANGES.find(r => val >= r.start && val <= r.end);
    return match ? match : { country: "Unknown", type: "CIVILIAN" };
};

const getAgency = (ownOp, callsign) => {
    ownOp = (ownOp || "").toUpperCase();
    callsign = (callsign || "").toUpperCase();
    for (const [agency, keywords] of Object.entries(LEO_AGENCIES)) {
        if (keywords.some(k => ownOp.includes(k) || callsign.includes(k))) return agency;
    }
    return null;
};

const calcMission = (ac, hist) => {
    const type = (ac.t || "").toUpperCase();
    if (["KC13", "KC46", "K35R"].includes(type)) return "AERIAL REFUELING";
    if (Math.abs(ac.baro_rate) > 3500) return "TACTICAL MANEUVERS";
    if (hist.length > 8) {
        let turns = 0;
        for (let i = 1; i < hist.length; i++) { if (Math.abs(hist[i].h - hist[i-1].h) > 15) turns++; }
        if (turns > 4 && ac.gs < 180) return "SURVEILLANCE ORBIT";
    }
    return "EN ROUTE / TRANSIT";
};

// --- 5. MAIN SCANNER ---
async function scrapeRadar() {
    const center = map.getCenter();
    
    // SAFETY CHECK: Prevent 400 Error if map isn't ready
    if (!center || !center.lat || !center.lng || (center.lat === 0 && center.lng === 0)) {
        hudLog("<span style='color:yellow'>WAITING: Stabilizing GPS...</span>");
        return; 
    }

    hudLog("Pinging API...");
    
    // CLEAN COORDINATES: Rounding to 4 decimal places
    const lat = center.lat.toFixed(4);
    const lon = center.lng.toFixed(4);
    const url = `https://api.adsb.lol/v2/lat/${lat}/lon/${lon}/dist/300`;

    try {
        const res = await fetch(url);
        if (!res.ok) {
            // If we still get a 400, this will tell us exactly what was sent
            throw new Error(`HTTP ${res.status} (Sent: ${lat}, ${lon})`);
        }
        
        const data = await res.json();
        const aircraft = data.ac || [];
        
        flightLayers.clearLayers();

        for (const ac of aircraft) {
            if (!ac.lat || !ac.lon) continue;

            if (!history[ac.hex]) history[ac.hex] = [];
            history[ac.hex].push({ p: [ac.lat, ac.lon], h: ac.track });
            if (history[ac.hex].length > 50) history[ac.hex].shift();

            const intel = analyzeHex(ac.hex);
            const isMil = ac.mil === 1 || intel.type === "MILITARY";
            const agency = getAgency(ac.ownOp, ac.flight);
            const isHeli = (ac.desc || "").includes("HELICOPTER") || (ac.t || "").startsWith("H");
            const mission = calcMission(ac, history[ac.hex]);
            
            const color = isMil ? '#cc0000' : (agency ? '#0033cc' : '#00ffcc');
            
            L.polyline(history[ac.hex].map(h => h.p), { color: color, weight: 1.5, opacity: 0.6 }).addTo(flightLayers);
            const marker = L.marker([ac.lat, ac.lon], { icon: getIcon(isHeli, color, ac.track || 0) }).addTo(flightLayers);

            marker.bindPopup(`
                <div class="popup-intel">
                    <b>ID:</b> ${ac.flight || 'NOSIGN'}<br>
                    <b>TYPE:</b> ${ac.t || 'UNK'}<br>
                    <b>MISSION:</b> ${mission}
                </div>
            `);
        }
        hudLog(`Tracking ${aircraft.length} targets.`);
    } catch (e) {
        hudLog(`<span style="color:orange; font-weight:bold;">API ERR: ${e.message}</span>`);
    }
}

}

// Start sequence
setTimeout(scrapeRadar, 1500); // Wait 1.5s for map to settle before first ping
setInterval(scrapeRadar, 15000);
map.on('moveend', scrapeRadar);

hudLog("System Ready.");

</script>
</body>
</html>
