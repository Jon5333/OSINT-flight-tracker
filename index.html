<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>STRATCOM v17.0</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  html, body { margin:0; height:100%; background:#000; font-family: 'Share Tech Mono', monospace; color: #00ffcc; overflow: hidden; }
  #map { width:100%; height:100%; background: #000; }
  
  #hud { 
    position: absolute; top: 10px; left: 10px; right: 10px; max-width: 480px;
    background: rgba(5, 10, 15, 0.95); border: 1px solid #00ffcc; 
    padding: 12px; z-index: 1000; pointer-events: auto;
  }
  
  .filter-row { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
  .tgl-btn { flex: 1; min-width: 90px; background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; color: #00ffcc; font-size: 10px; padding: 6px; cursor: pointer; text-align: center; }
  .tgl-btn.active { background: #00ffcc; color: #000; font-weight: bold; }
  .refresh-btn { background: #ffcc00 !important; color: #000 !important; border: 1px solid #ffcc00 !important; font-weight: bold; }

  .leaflet-popup-content-wrapper { background: #ffffff !important; color: #000 !important; border-radius: 0px; border: 2px solid #333; }
  .leaflet-popup-content { margin: 0 !important; width: 300px !important; }
  
  .img-frame { background: #111; position: relative; width: 100%; height: 160px; border-bottom: 2px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .ac-photo { position: absolute; top:0; left:0; z-index: 2; width: 100%; height: 100%; object-fit: cover; }
  .no-img-label { color: #00ffcc; font-size: 10px; z-index: 1; }

  .intel-body { padding: 12px; }
  .mil-banner { background: #d32f2f; color: #fff; padding: 4px; font-weight: bold; text-align: center; font-size: 10px; }
  .intel-row { border-bottom: 1px solid #eee; padding: 4px 0; display: flex; justify-content: space-between; font-size: 11px; }
  .intel-row b { color: #555; }
</style>
</head>
<body>

<div id="hud">
  <div style="font-size: 18px; font-weight: bold; letter-spacing: 2px;">🛰️ STRATCOM v17.0</div>
  <div style="font-size: 11px; color: #00ffcc;">INTEL: NEXRAD RADAR & GLOBAL ASSETS</div>
  
  <div class="filter-row">
    <div id="f-mil" class="tgl-btn" onclick="toggleFilter('mil')">MILITARY</div>
    <div id="f-heli" class="tgl-btn" onclick="toggleFilter('heli')">ROTORS</div>
    <div id="f-infra" class="tgl-btn active" onclick="toggleFilter('infra')">INFRA</div>
    <div class="tgl-btn refresh-btn" onclick="scrapeRadar()">SCAN AREA</div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const WORKER_URL = "https://adsb-bridge.lezattackpenguinskindig.workers.dev/";
const ICAO_MILITARY = [0xAE0000, 0xAF0000, 0xAD0000, 0x43C000];

let map, flightLayers, infraLayers, nexradLayer;
let isUpdating = false;
const filters = { mil: false, heli: false, infra: true };

function getCountry(hex) {
    const h = parseInt(hex, 16);
    if (h >= 0xA00000 && h <= 0xAFFFFF) return "United States 🇺🇸";
    if (h >= 0x400000 && h <= 0x43FFFF) return "United Kingdom 🇬🇧";
    if (h >= 0x380000 && h <= 0x3BFFFF) return "France 🇫🇷";
    if (h >= 0x3C0000 && h <= 0x3FFFFF) return "Germany 🇩🇪";
    if (h >= 0x7C0000 && h <= 0x7CFFFF) return "Australia 🇦🇺";
    if (h >= 0x880000 && h <= 0x88FFFF) return "South Korea 🇰🇷";
    if (h >= 0x890000 && h <= 0x89FFFF) return "Japan 🇯🇵";
    return "International / Unknown";
}

function toggleFilter(type) {
    filters[type] = !filters[type];
    document.getElementById(`f-${type}`).classList.toggle('active');
    if(type === 'infra') filters[type] ? infraLayers.addTo(map) : map.removeLayer(infraLayers);
    scrapeRadar();
}

function initMap() {
    const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
    const satHD = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });

    map = L.map('map', { zoomControl: false, layers: [darkMap] }).setView([32.8, -79.9], 6);
    
    flightLayers = L.layerGroup().addTo(map);
    infraLayers = L.layerGroup().addTo(map);

    // FIXED NEXRAD WMS
    nexradLayer = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi", {
        layers: 'nexrad-n0r-900913',
        format: 'image/png',
        transparent: true,
        version: '1.1.1',
        opacity: 0.5,
        zIndex: 500
    }).addTo(map);

    L.control.layers({
        "Tactical Dark": darkMap, 
        "Satellite": satHD
    }, {
        "NEXRAD Weather": nexradLayer,
        "Infrastructure": infraLayers
    }, { collapsed: false }).addTo(map);

    loadInfrastructure();
    scrapeRadar();
    setInterval(scrapeRadar, 30000);
}

function loadInfrastructure() {
    const locs = [
        { n: "KCHS: JB Charleston", c: [32.89, -80.04], m:1 },
        { n: "KJFK: New York JFK", c: [40.64, -73.77], m:0 },
        { n: "KSNA: John Wayne", c: [33.67, -117.86], m:0 },
        { n: "KDCA: Reagan National", c: [38.85, -77.03], m:0 },
        { n: "KJB-MC: JB Lewis-McChord", c: [47.13, -122.48], m:1 },
        { n: "EGLL: London Heathrow", c: [51.47, -0.45], m:0 },
        { n: "YSSY: Sydney Kingsford Smith", c: [-33.93, 151.17], m:0 },
        { n: "RODN: Kadena AB (JP)", c: [26.35, 127.76], m:1 }
    ];
    locs.forEach(l => {
        L.circleMarker(l.c, { radius: 6, color: l.m ? '#f33':'#0af', weight: 2, fillOpacity: 0.3 }).bindPopup(`<b>${l.n}</b>`).addTo(infraLayers);
    });
}

async function scrapeRadar() {
    if(isUpdating) return;
    isUpdating = true;
    const c = map.getCenter();
    const url = `${WORKER_URL}?url=${encodeURIComponent(`https://api.adsb.lol/v2/lat/${c.lat.toFixed(2)}/lon/${c.lng.toFixed(2)}/dist/500`)}&p=${Date.now()}`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        const acs = data.ac || [];
        flightLayers.clearLayers();

        acs.forEach(ac => {
            if (!ac.lat || !ac.lon) return;
            const isMil = ac.mil === 1 || ICAO_MILITARY.some(m => (parseInt(ac.hex, 16) & 0xFF0000) === m);
            const isHeli = (ac.t && (ac.t.includes('H6') || ac.t.includes('EC'))) || ac.category === 'A7';
            const hex = ac.hex.toUpperCase();
            
            if (filters.mil && !isMil) return;
            if (filters.heli && !isHeli) return;

            let color = isMil ? '#f33' : (isHeli ? '#fc0' : '#0fc');
            L.marker([ac.lat, ac.lon], { 
                icon: L.divIcon({ 
                    html: `<div style="transform: rotate(${ac.track || 0}deg);"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="${color}" d="${isHeli ? 'M12 2L13 3H21V5H13L12 6H15V8H13V12H15V14H13V19H11V14H9V12H11V8H9V6H12L11 3H3V1H11L12 2Z' : 'M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z'}"/></svg></div>`,
                    className: 'ac-icon', iconSize: [24, 24] 
                }) 
            })
            .bindPopup(`
                <div class="popup-intel">
                    <div class="img-frame">
                        <div class="no-img-label">SEARCHING DATABASE...</div>
                        <img class="ac-photo" src="https://hexdb.io/images/${hex}.jpg" onerror="this.style.display='none'">
                    </div>
                    ${isMil ? '<div class="mil-banner">MILITARY ASSET</div>' : ''}
                    <div class="intel-body">
                        <div class="intel-row"><b>CALLSIGN:</b> <span>${ac.flight || '---'}</span></div>
                        <div class="intel-row"><b>COUNTRY:</b> <span>${getCountry(hex)}</span></div>
                        <div class="intel-row"><b>HEX ID:</b> <span>${hex}</span></div>
                        <div class="intel-row"><b>ALT:</b> <span>${ac.alt_baro || '---'} FT</span></div>
                        <div class="intel-row"><b>SPD:</b> <span>${Math.round(ac.gs || 0)} KTS</span></div>
                    </div>
                </div>
            `).addTo(flightLayers);
        });
    } catch (e) { console.log("Uplink Error"); }
    finally { isUpdating = false; }
}

window.onload = () => { setTimeout(initMap, 500); };
</script>
</body>
</html>
