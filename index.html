<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>STRATCOM v14.5 - Ghost Recon</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  html, body { margin:0; height:100%; background:#000; font-family: 'Share Tech Mono', monospace; color: #00ffcc; overflow: hidden; }
  #map { width:100%; height:100%; background: #000; }
  
  #hud { 
    position: absolute; top: 10px; left: 10px; right: 10px; max-width: 400px;
    background: rgba(5, 10, 15, 0.9); border: 1px solid #00ffcc; 
    padding: 12px; z-index: 1000; pointer-events: none;
  }
  #intel-log { height: 100px; overflow-y: auto; font-size: 11px; border-top: 1px solid #1a3a3a; margin-top: 8px; padding-top: 5px; color: #00ccaa; pointer-events: auto; }
  .btn-refresh { pointer-events: auto; background: #00ffcc; color: #000; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; float: right; font-size: 10px; }

  /* Tactical Popups */
  .leaflet-popup-content-wrapper { background: #ffffff !important; color: #000 !important; border-radius: 0px; border: 2px solid #333; }
  .leaflet-popup-content { margin: 0 !important; width: 240px !important; }
  .popup-intel { font-family: 'Arial', sans-serif; font-size: 12px; padding: 10px; }
  .mil-banner { background: #d32f2f; color: #fff; padding: 6px; font-weight: bold; text-align: center; font-size: 10px; margin-bottom: 8px; }
  .nic-warn { background: #bf00ff; color: #fff; padding: 4px; font-size: 10px; text-align: center; margin-bottom: 5px; font-weight: bold; }
  .intel-row { border-bottom: 1px solid #eee; padding: 3px 0; display: flex; justify-content: space-between; }
  .ac-icon { display: flex; justify-content: center; align-items: center; }

  /* Custom Layer Control Styling */
  .leaflet-control-layers { background: rgba(5, 10, 15, 0.9) !important; color: #00ffcc !important; border: 1px solid #00ffcc !important; font-family: 'Share Tech Mono' !important; }
</style>
</head>
<body>

<div id="hud">
  <button class="btn-refresh" onclick="scrapeRadar()">SCAN PULSE</button>
  <div style="font-size: 20px; font-weight: bold; letter-spacing: 2px;">🛰️ STRATCOM v14.5</div>
  <div id="status" style="font-size: 11px; color: #ffcc00;">UPLINK: DARK OPS BASE</div>
  <div id="intel-log">> Multi-Layer Sync Active...<br>> NIC Interference Check Live...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const WORKER_URL = "https://adsb-bridge.lezattackpenguinskindig.workers.dev/";
const ICAO_MILITARY = [0xAE0000, 0xAF0000, 0xAD0000, 0x43C000];

let map, flightLayers, noFlyLayers, trailLayers;
let isUpdating = false;
let history = {}; 

function initMap() {
    // 1. Dark Ops Base Layer
    const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    });

    // 2. HD Satellite Terrain (Esri World Imagery - Highly Reliable)
    const satHD = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics'
    });

    // 3. Live NEXRAD Weather Radar
    const weatherMap = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi", {
        layers: 'nexrad-n0r-900913', format: 'image/png', transparent: true, opacity: 0.5
    });

    // Initialize Map
    map = L.map('map', { 
        zoomControl: false, 
        preferCanvas: true,
        layers: [darkMap] // Default View is Dark Ops
    }).setView([38.89, -77.03], 7);

    // Toggle Control
    const baseMaps = {
        "Dark Ops Mode": darkMap,
        "HD Satellite Terrain": satHD
    };

    const overlayMaps = {
        "NEXRAD Weather": weatherMap
    };

    L.control.layers(baseMaps, overlayMaps).addTo(map);

    flightLayers = L.layerGroup().addTo(map);
    noFlyLayers = L.layerGroup().addTo(map);
    trailLayers = L.layerGroup().addTo(map);
    
    runBotSwarm();
    scrapeRadar();
}

const hudLog = (msg) => {
    const log = document.getElementById('intel-log');
    if(log) log.innerHTML = `> ${msg}<br>` + log.innerHTML.slice(0, 300);
};

// --- TFR BOT ---
async function runBotSwarm() {
    const faaTfrUrl = "https://services6.arcgis.com/ssUqYtj9l9mC24RE/arcgis/rest/services/Temporary_Flight_Restrictions/FeatureServer/0/query?where=1%3D1&outFields=*&f=geojson";
    const bridgeUrl = `${WORKER_URL}?url=${encodeURIComponent(faaTfrUrl)}&cb=${Date.now()}`;
    try {
        const res = await fetch(bridgeUrl, { signal: AbortSignal.timeout(6000) });
        const geojson = await res.json();
        if(geojson.features) {
            noFlyLayers.clearLayers();
            L.geoJSON(geojson, { 
                style: { color: '#ff3300', weight: 2, fillOpacity: 0.1, dashArray: '8, 4' }
            }).addTo(noFlyLayers);
            hudLog(`FAA: ${geojson.features.length} Restricted Zones Active.`);
        }
    } catch (e) { hudLog("FAA: Data Stalled."); }
}

// --- ICON ENGINE (Heli & Plane Profiles) ---
const getIcon = (color, track, isHeli) => {
    const rot = track || 0;
    // Top-down Helicopter SVG
    const heliPath = "M12 2l1 1h8v2h-8l-1 1h3v2h-2v4h2v2h-2v5h-2v-5h-2v-2h2v-4h-2v-2h3l-1-1h-8v-2h8l1-1z";
    // Plane SVG
    const planePath = "M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z";
    
    const svg = `<svg viewBox="0 0 24 24" width="26" height="26" style="transform: rotate(${rot}deg); filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));"><path fill="${color}" d="${isHeli ? heliPath : planePath}"/></svg>`;
    return L.divIcon({ html: svg, className: 'ac-icon', iconSize: [26, 26] });
};

// --- RADAR ENGINE ---
async function scrapeRadar() {
    if(!map || isUpdating) return;
    isUpdating = true;
    document.getElementById('status').innerHTML = "SCANNING...";

    const center = map.getCenter();
    const apiTarget = `https://api.adsb.lol/v2/lat/${center.lat.toFixed(3)}/lon/${center.lng.toFixed(3)}/dist/100`;
    const bridgeUrl = `${WORKER_URL}?url=${encodeURIComponent(apiTarget)}&pulse=${Date.now()}`;

    try {
        const res = await fetch(bridgeUrl, { signal: AbortSignal.timeout(10000) });
        const data = await res.json();
        const aircraft = data.ac || [];
        
        flightLayers.clearLayers();
        trailLayers.clearLayers();
        
        aircraft.forEach(ac => {
            if (!ac.lat || !ac.lon) return;

            const nic = ac.nic || 0;
            const isLowNic = nic < 7;
            const isHeli = (ac.t && (ac.t.includes('EC') || ac.t.includes('B0') || ac.t.includes('H6') || ac.t.includes('SK76') || ac.t.includes('MD5'))) || (ac.category === 'A7');
            const hexVal = parseInt(ac.hex, 16);
            const isMil = ac.mil === 1 || ICAO_MILITARY.some(m => (hexVal & 0xFF0000) === m);
            
            let color = '#00ffcc'; // Default Teal
            if (isHeli) color = '#ffcc00'; // Yellow Heli
            if (isMil) color = '#ff0000'; // Red Military
            if (isLowNic) color = '#bf00ff'; // Purple NIC Warning

            // Tactical Trails (5 steps)
            if (!history[ac.hex]) history[ac.hex] = [];
            history[ac.hex].push([ac.lat, ac.lon]);
            if (history[ac.hex].length > 5) history[ac.hex].shift();
            L.polyline(history[ac.hex], { color: color, weight: 1.5, opacity: 0.4, dashArray: '2, 4' }).addTo(trailLayers);

            L.marker([ac.lat, ac.lon], { icon: getIcon(color, ac.track, isHeli) })
            .bindPopup(`
                <div class="popup-intel">
                    ${isMil ? '<div class="mil-banner">MILITARY ASSET</div>' : ''}
                    ${isLowNic ? `<div class="nic-warn">SIGNAL WARNING: NIC ${nic}</div>` : ''}
                    <div class="intel-row"><b>ID:</b> <span>${ac.flight || 'N/A'}</span></div>
                    <div class="intel-row"><b>HEX:</b> <span>${ac.hex.toUpperCase()}</span></div>
                    <div class="intel-row"><b>TYPE:</b> <span>${ac.t || 'Unknown'}</span></div>
                    <div class="intel-row"><b>MODEL:</b> <span>${ac.desc || 'Classified'}</span></div>
                    <div class="intel-row"><b>NIC:</b> <span>${nic}</span></div>
                    <div style="margin-top:8px; font-weight:bold; border-top: 1px solid #ddd; padding-top:5px;">
                        ALT: ${ac.alt_baro || '---'} ft | SPD: ${Math.round(ac.gs || 0)} kts
                    </div>
                </div>
            `)
            .addTo(flightLayers);
        });
        
        hudLog(`Pulse: ${aircraft.length} Targets Detected.`);
        document.getElementById('status').innerHTML = "UPLINK: SECURE";
    } catch (e) { document.getElementById('status').innerHTML = "UPLINK: TIMEOUT"; }
    finally { isUpdating = false; }
}

setTimeout(initMap, 800); 
setInterval(scrapeRadar, 15000);
setInterval(runBotSwarm, 120000); 
map.on('moveend', scrapeRadar);
</script>
</body>
</html>
