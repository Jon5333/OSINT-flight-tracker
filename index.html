<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>STRATCOM v13.5 - Swarm Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  html, body { margin:0; height:100%; background:#050505; font-family: 'Share Tech Mono', monospace; color: #00ffcc; overflow: hidden; }
  #map { width:100%; height:100%; background: #000; }
  #hud { 
    position: absolute; top: 10px; left: 10px; right: 10px; max-width: 400px;
    background: rgba(5, 10, 15, 0.95); border: 1px solid #00ffcc; 
    padding: 12px; z-index: 1000; box-shadow: 0 0 15px rgba(0,255,204,0.3);
    pointer-events: none;
  }
  #intel-log { height: 110px; overflow-y: auto; font-size: 11px; border-top: 1px solid #1a3a3a; margin-top: 8px; padding-top: 5px; color: #00ccaa; pointer-events: auto; }
  .leaflet-popup-content-wrapper { background: #ffffff !important; color: #000 !important; border-radius: 0px; border: 2px solid #333; }
  .popup-intel { font-family: 'Arial', sans-serif; font-size: 12px; line-height: 1.4; }
  .mil-banner { background: #d32f2f; color: #fff; padding: 4px; font-weight: bold; text-align: center; margin-bottom: 5px; text-transform: uppercase; }
  .jam-banner { background: #ff9800; color: #000; padding: 4px; font-weight: bold; text-align: center; margin-bottom: 5px; border: 1px solid #000; }
  .ac-icon { display: flex; justify-content: center; align-items: center; }
</style>
</head>
<body>

<div id="hud">
  <div style="font-size: 20px; font-weight: bold; letter-spacing: 1px;">🛰️ STRATCOM v13.5</div>
  <div id="status" style="font-size: 10px; color: #ffcc00;">UPLINK: INITIALIZING SWARM...</div>
  <div id="intel-log">> Booting FAA Monitoring Bots...<br>> EW Cluster Engine Online...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// --- CONFIGURATION ---
const WORKER_URL = "https://adsb-bridge.lezattackpenguinskindig.workers.dev/";
const ICAO_RANGES = [
    { start: 0xAE0000, end: 0xAFFFFF, country: "USA 🇺🇸", type: "MILITARY" },
    { start: 0xAD0000, end: 0xADFFFF, country: "USA 🇺🇸", type: "MILITARY" },
    { start: 0x43C000, end: 0x43CFFF, country: "UK 🇬🇧", type: "MILITARY" }
];

// --- MAP INIT ---
const map = L.map('map', { zoomControl: false }).setView([38.89, -77.03], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const flightLayers = L.layerGroup().addTo(map);
const noFlyLayers = L.layerGroup().addTo(map);
const ewLayers = L.layerGroup().addTo(map);
const history = {};

const hudLog = (msg) => {
    const log = document.getElementById('intel-log');
    log.innerHTML = `> ${msg}<br>` + log.innerHTML;
};

// --- BOT SWARM: FAA TFR MONITOR ---
async function runBotSwarm() {
    const faaTfrUrl = "https://services6.arcgis.com/ssUqYtj9l9mC24RE/arcgis/rest/services/Temporary_Flight_Restrictions/FeatureServer/0/query?where=1%3D1&outFields=*&f=geojson";
    const bridgeUrl = `${WORKER_URL}?url=${encodeURIComponent(faaTfrUrl)}`;
    try {
        const res = await fetch(bridgeUrl);
        const geojson = await res.json();
        noFlyLayers.clearLayers();
        L.geoJSON(geojson, {
            style: { color: '#ff3300', weight: 2, fillOpacity: 0.15 },
            onEachFeature: (f, layer) => {
                layer.bindPopup(`<b>FAA TFR ACTIVE</b><br>${f.properties.NAME || 'Restricted Area'}<br>ID: ${f.properties.NOTAM || 'N/A'}`);
            }
        }).addTo(noFlyLayers);
        hudLog(`SWARM: ${geojson.features.length} FAA TFRs synced.`);
    } catch (e) { hudLog("SWARM ERR: FAA Sync Failed."); }
}

// --- EW DETECTION ENGINE (DYNAMIC CLUSTERING) ---
function analyzeElectronicWarfare(aircraft) {
    ewLayers.clearLayers();
    const jammedNodes = aircraft.filter(ac => ac.nic !== undefined && ac.nic < 5 && ac.lat && ac.lon);
    if (jammedNodes.length < 2) return;

    const clusters = [];
    jammedNodes.forEach(ac => {
        let added = false;
        for (let c of clusters) {
            if (map.distance([ac.lat, ac.lon], c.center) < 40000) {
                c.points.push([ac.lat, ac.lon]);
                added = true; break;
            }
        }
        if (!added) clusters.push({ center: [ac.lat, ac.lon], points: [[ac.lat, ac.lon]] });
    });

    clusters.forEach(c => {
        if (c.points.length >= 2) {
            L.circle(c.center, { color: '#ffcc00', fillColor: '#ffcc00', fillOpacity: 0.2, radius: 30000, weight: 2, dashArray: "5, 10" })
            .bindPopup(`<b>EW CLUSTER DETECTED</b><br>Degraded GPS signals: ${c.points.length}`)
            .addTo(ewLayers);
            hudLog(`<span style="color:#ffcc00;">EW ALERT: Jamming cluster detected.</span>`);
        }
    });
}

// --- CORE RADAR ENGINE ---
const getIcon = (color, track, isJammed) => {
    const finalColor = isJammed ? "#ff9800" : color;
    const svg = `<svg viewBox="0 0 24 24" width="24" height="24" style="transform: rotate(${track}deg);"><path fill="${finalColor}" d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`;
    return L.divIcon({ html: svg, className: 'ac-icon', iconSize: [24, 24], iconAnchor: [12, 12] });
};

async function scrapeRadar() {
    const center = map.getCenter();
    const apiTarget = `https://api.adsb.lol/v2/lat/${center.lat.toFixed(3)}/lon/${center.lng.toFixed(3)}/dist/100`;
    const bridgeUrl = `${WORKER_URL}?url=${encodeURIComponent(apiTarget)}`;
    try {
        const res = await fetch(bridgeUrl);
        const data = await res.json();
        const aircraft = data.ac || [];
        analyzeElectronicWarfare(aircraft);
        flightLayers.clearLayers();
        document.getElementById('status').innerHTML = "UPLINK: <span style='color:#00ffcc;'>BRIDGE_ACTIVE</span>";

        aircraft.forEach(ac => {
            if (!ac.lat || !ac.lon) return;
            const val = parseInt(ac.hex, 16);
            const isMil = ac.mil === 1 || ICAO_RANGES.some(r => val >= r.start && val <= r.end);
            const isJammed = ac.nic !== undefined && ac.nic < 6;
            const color = isMil ? '#ff0000' : '#00ffcc';
            
            L.marker([ac.lat, ac.lon], { icon: getIcon(color, ac.track || 0, isJammed) })
            .bindPopup(`<div class="popup-intel">${isMil ? '<div class="mil-banner">MILITARY</div>' : ''}${isJammed ? '<div class="jam-banner">GPS JAMMED</div>' : ''}<b>ID:</b> ${ac.flight || 'GHOST'}<br><b>ALT:</b> ${ac.alt_baro}ft</div>`)
            .addTo(flightLayers);
        });
    } catch (e) { document.getElementById('status').innerHTML = "UPLINK: <span style='color:red;'>FAILED</span>"; }
}

setInterval(scrapeRadar, 15000);
setInterval(runBotSwarm, 60000);
scrapeRadar();
runBotSwarm();
map.on('moveend', scrapeRadar);
hudLog("STRATCOM v13.5 Tactical Ready.");
</script>
</body>
</html>
