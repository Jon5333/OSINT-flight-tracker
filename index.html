<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSINT STRATCOM v12.6 - Global Deployment</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  html, body { margin:0; height:100%; background:#050505; font-family: 'Share Tech Mono', monospace; color: #00ffcc; overflow: hidden; }
  #map { width:100%; height:100%; background: #000; }
  
  /* Deployment HUD */
  #hud { 
    position: absolute; top: 15px; left: 15px; width: 340px; 
    background: rgba(5, 10, 15, 0.95); border: 1px solid #00ffcc; 
    padding: 15px; z-index: 1000; box-shadow: 0 0 20px rgba(0,255,204,0.3);
  }
  #intel-log { height: 160px; overflow-y: auto; font-size: 11px; border-top: 1px solid #1a3a3a; margin-top: 10px; padding-top: 5px; color: #00ccaa; }
  
  /* Popups */
  .leaflet-popup-content-wrapper { background: #ffffff !important; color: #000!important; border-radius: 0px; border: 2px solid #333; }
  .popup-intel { font-family: 'Arial', sans-serif; font-size: 12px; line-height: 1.4; }
  .mil-banner { background: #d32f2f; color: #fff; padding: 4px; font-weight: bold; text-align: center; margin-bottom: 5px; text-transform: uppercase; }
  .mission-tag { background: #eee; border: 1px dashed #444; padding: 4px; font-weight: bold; margin-top: 6px; display: block; text-align: center; }
  .ac-icon { display: flex; justify-content: center; align-items: center; }
</style>
</head>
<body>

<div id="hud">
  <div style="font-size: 20px; font-weight: bold;">🛰️ STRATCOM v12.6</div>
  <div id="status" style="font-size: 10px; color: #ffcc00;">MODE: GITHUB DEPLOYMENT</div>
  <div id="intel-log">> Deploying Proxy Bridge...<br>> Routing via Secure Gateway...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// --- CORE INTEL ---
const ICAO_RANGES = [
    { start: 0xAE0000, end: 0xAFFFFF, country: "USA 🇺🇸", type: "MILITARY" },
    { start: 0xAD0000, end: 0xADFFFF, country: "USA 🇺🇸", type: "MILITARY" },
    { start: 0x43C000, end: 0x43CFFF, country: "UK 🇬🇧", type: "MILITARY" },
    { start: 0x3F0000, end: 0x3FFFFF, country: "Germany 🇩🇪", type: "MILITARY" }
];

// --- MAP INIT ---
const map = L.map('map', { zoomControl: false }).setView([38.89, -77.03], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const weatherMap = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0r.cgi", {
    layers: 'nexrad-n0r-900913', format: 'image/png', transparent: true, opacity: 0.4
});
L.control.layers({}, {"Live Radar": weatherMap}).addTo(map);

const history = {};
const flightLayers = L.layerGroup().addTo(map);

const hudLog = (msg) => {
    const log = document.getElementById('intel-log');
    log.innerHTML = `> ${msg}<br>` + log.innerHTML;
};

const getIcon = (isHeli, color, track) => {
    const svg = isHeli ? 
    `<svg viewBox="0 0 24 24" width="24" height="24" style="transform: rotate(${track}deg);"><path fill="${color}" d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14h-2v-4h2v4zm0-6h-2V6h2v4z"/><path fill="${color}" d="M11 6h2v8h-2zM4 11h16v2H4z"/></svg>` :
    `<svg viewBox="0 0 24 24" width="22" height="22" style="transform: rotate(${track}deg);"><path fill="${color}" d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`;
    return L.divIcon({ html: svg, className: 'ac-icon', iconSize: [24, 24], iconAnchor: [12, 12] });
};

const analyzeIntel = (hex) => {
    const val = parseInt(hex, 16);
    const match = ICAO_RANGES.find(r => val >= r.start && val <= r.end);
    return match || { country: "Civilian", type: "CIV" };
};

// --- DATA FETCH (GITHUB COMPATIBLE) ---
async function scrapeRadar() {
    const center = map.getCenter();
    const rawTarget = `https://api.adsb.lol/v2/lat/${center.lat.toFixed(3)}/lon/${center.lng.toFixed(3)}/dist/300`;
    
    // Deployment Secret: We use the proxy specifically for GitHub Pages
    const url = `https://corsproxy.io/?${encodeURIComponent(rawTarget)}`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        const aircraft = data.ac || [];
        
        flightLayers.clearLayers();

        aircraft.forEach(ac => {
            if (!ac.lat || !ac.lon) return;

            if (!history[ac.hex]) history[ac.hex] = [];
            history[ac.hex].push({ p: [ac.lat, ac.lon], h: ac.track });
            if (history[ac.hex].length > 50) history[ac.hex].shift();

            const intel = analyzeIntel(ac.hex);
            const isMil = ac.mil === 1 || intel.type === "MILITARY";
            const isHeli = (ac.desc || "").includes("HELI") || (ac.t || "").startsWith("H");
            const color = isMil ? '#ff0000' : '#00ffcc';
            
            L.polyline(history[ac.hex].map(h => h.p), { color: color, weight: 1, opacity: 0.3 }).addTo(flightLayers);
            const marker = L.marker([ac.lat, ac.lon], { icon: getIcon(isHeli, color, ac.track || 0) }).addTo(flightLayers);

            marker.bindPopup(`
                <div class="popup-intel">
                    ${isMil ? '<div class="mil-banner">MILITARY ASSET</div>' : ''}
                    <b>ID:</b> ${ac.flight || 'UNK'} | <b>HEX:</b> ${ac.hex.toUpperCase()}<br>
                    <b>COUNTRY:</b> ${intel.country}<br>
                    <b>ALT:</b> ${ac.alt_baro} ft | <b>SPD:</b> ${Math.round(ac.gs)} kt
                </div>
            `);
        });
        hudLog(`Sync OK: ${aircraft.length} assets tracked.`);
    } catch (e) {
        hudLog(`<span style="color:red;">PROXY ERROR: Reconnecting...</span>`);
    }
}

setInterval(scrapeRadar, 15000);
scrapeRadar();
map.on('moveend', scrapeRadar);
</script>
</body>
</html>
